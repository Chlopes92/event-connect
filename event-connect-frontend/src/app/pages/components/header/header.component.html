<header class="header"
        [class.scrolled]="isScrolled"
        [class.hidden]="!isVisible"
        [class.transparent]="isHomePage && !isScrolled">

  <!-- LOGO -->
   <a routerLink="/home" class="logo">
      <img src="assets/logo/logo-header.png" alt="Retour à l'accueil">
   </a>

  <!-- NAV DESKTOP -->
  <nav class="nav desktop-nav">

    <a routerLink="/home" class="nav-item">ACCUEIL</a>

    <a href="#events-container"
       (click)="scrollToEvents($event)"
       class="nav-item">
       EVENTS
    </a>

    <a [class.disabled]="!aboutEnabled"
       class="nav-item">

      A PROPOS

      <span *ngIf="!aboutEnabled"
            class="tooltip">
            Bientôt disponible
      </span>

    </a>

  </nav>

  <!-- ACTIONS DESKTOP -->
  <div class="header-actions desktop-nav">

    <img class="icon-account"
         routerLink="/client-signup"
         src="assets/icons/account.png"
         alt="Compte">

    <div class="icon-wrapper"
         [class.disabled]="!wishlistEnabled">

      <img src="assets/icons/wishlist.png"
           alt="Liste des souhaits">

      <span *ngIf="!wishlistEnabled"
            class="tooltip">
            Bientôt disponible
      </span>

    </div>

    <div class="icon-wrapper"
         [class.disabled]="!ticketEnabled">

      <img src="assets/icons/ticket.png"
           alt="Billetterie">

      <span *ngIf="!ticketEnabled"
            class="tooltip">
            Bientôt disponible
      </span>

    </div>

  </div>

  <!-- ✅ BURGER FIX -->
  <button class="menu-toggle"
          [class.open]="isMenuOpen"
          (click)="toggleMenu()"
          aria-label="Menu"
          [attr.aria-expanded]="isMenuOpen"
          aria-controls="mobile-menu">

    <span></span>

  </button>

</header>

<!-- MENU MOBILE -->
<div id="mobile-menu"
     class="mobile-menu"
     [class.show]="isMenuOpen">

  <a routerLink="/home"
     (click)="toggleMenu()">Accueil</a>

  <a href="#events-container"
     (click)="scrollToEvents($event); toggleMenu()">
     Events
  </a>

  <!-- ✅ FIX accessibilité -->
  <button class="mobile-link"
          (click)="toggleMenu()">
    A propos
  </button>

  <a routerLink="/client-signup"
     (click)="toggleMenu()">Compte</a>
  
  <a routerLink="/client-signup"
     (click)="toggleMenu()">Wishlist</a>

</div>
